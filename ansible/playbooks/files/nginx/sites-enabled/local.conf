server {
    listen 443 default_server;# ssl;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/localhost/localhost+2.pem;
    ssl_certificate_key /etc/letsencrypt/live/localhost/localhost+2-key.pem;

    root /var/www/production;
    index index.html;

    # location /features/ list
    # location /features/abc branch name

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}
